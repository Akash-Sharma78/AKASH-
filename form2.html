<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Job Application</h3>
    <br>
    <fieldset>
    <form>
         <label for="Name"> Name:</label>
        <input type="text" name="name" id="Name" placeholder="Enter your name">
        <br>
        <br>
        <label for="email"> Email:</label>
        <input type="text" name="email " id="email" placeholder="enter email Id">
        <br>
        <br>
        <label for="phone no."> Phone:</label>
        <input type="tel" name="phone no. " id="phone" placeholder="Enter Phone No.">
        <br>
        <br>
        <label for="Files"> Resume:</label>
        <input type="file" name="files" id="files" ">
        <br>
        <br>
        <label for="count"> Experience(years):</label> 
        <br>
        <br>
        <input type="number" name="counter" id="counter" min="0" max="50">
        <br>
        <br>
<fieldset>
            <legend>Skills:</legend>
            <br>
            <input type="checkbox" name="choice" id="checkbox1">
            <label for="checkbox1">HTML</label>
            <input type="checkbox" name="choice" id="checkbox2">
            <label for="checkbox2">CSS</label> 
            <input type="checkbox" name="choice" id="checkbox3">
             <label for="checkbox3">Java Script</label>
          </fieldset>
         <br>
         <label for="eduction type"> Highest Education:</label>
         <select name="education type" id="education type">
            <option value="High School">High School</option>
            <option value="Intermediate">Intermediate</option>
            <option value="ITI">ITI</option>
            <option value="BTech">BTech</option>
         </select>
         <br>
         <br>
         <legend>Availability:</legend>
         <input type="radio" name="radio button" id="radio button1">
         <label for="radio button1"> Full time</label>
         
         <input type="radio" name="radio button" id="radio button2">
         <label for="radio button2">Part time</label>
         <br>
         <br>

         <label for="textarea1"> Additional Comment:</label>
         <br>
         <textarea name="textarea1" id="textarea1" cols="30" rows="5"></textarea>
         <input type="submit" value="submit">
    </form>
</fieldset>
</body>
</html>
